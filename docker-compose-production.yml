# HybridSocial Production Deployment
# Usage:
#   1. Copy .env.production.example to .env and fill in your values
#   2. docker compose -f docker-compose-production.yml up -d
#   3. docker compose -f docker-compose-production.yml exec backend bin/hybridsocial eval "Hybridsocial.Release.migrate()"
#
# First-time setup:
#   docker compose -f docker-compose-production.yml exec backend bin/hybridsocial eval "Hybridsocial.Release.setup()"

services:
  # ---- Infrastructure ----

  postgresql:
    image: postgres:17-alpine
    container_name: hs_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-hybridsocial}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      POSTGRES_DB: ${DB_NAME:-hybridsocial_prod}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-hybridsocial}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  valkey:
    image: valkey/valkey:8-alpine
    container_name: hs_valkey
    restart: unless-stopped
    command: ["valkey-server", "--appendonly", "yes", "--requirepass", "${VALKEY_PASSWORD:-}"]
    volumes:
      - valkeydata:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  nats:
    image: nats:2-alpine
    container_name: hs_nats
    restart: unless-stopped
    command: ["--jetstream", "--store_dir=/data", "--http_port=8222"]
    volumes:
      - natsdata:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8222/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  opensearch:
    image: opensearchproject/opensearch:2
    container_name: hs_search
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - searchdata:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 | grep -q 'opensearch'"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - internal

  # ---- Application ----

  # Generate instance actor keys on first startup
  init-keys:
    image: alpine:3.19
    container_name: hs_init_keys
    volumes:
      - ./docker/generate-instance-keys.sh:/generate-keys.sh:ro
      - ./.env:/app/.env
    command: sh /generate-keys.sh /app/.env
    restart: "no"

  backend-migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hs_migrate
    environment:
      DATABASE_URL: "ecto://${DB_USER:-hybridsocial}:${DB_PASSWORD:?}@postgresql/${DB_NAME:-hybridsocial_prod}"
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:?Set SECRET_KEY_BASE in .env (mix phx.gen.secret)}
      VALKEY_URL: "redis://valkey:6379"
      NATS_URL: "nats://nats:4222"
      OPENSEARCH_URL: "http://opensearch:9200"
    command: ["eval", "Hybridsocial.Release.migrate()"]
    depends_on:
      postgresql:
        condition: service_healthy
    networks:
      - internal
    restart: "no"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hs_backend
    restart: unless-stopped
    depends_on:
      init-keys:
        condition: service_completed_successfully
      backend-migrate:
        condition: service_completed_successfully
      postgresql:
        condition: service_healthy
      valkey:
        condition: service_healthy
      nats:
        condition: service_healthy
      opensearch:
        condition: service_healthy
    environment:
      PHX_SERVER: "true"
      PORT: "4000"
      DATABASE_URL: "ecto://${DB_USER:-hybridsocial}:${DB_PASSWORD:?}@postgresql/${DB_NAME:-hybridsocial_prod}"
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:?Set SECRET_KEY_BASE in .env (mix phx.gen.secret)}
      PHX_HOST: ${DOMAIN:?Set DOMAIN in .env}
      VALKEY_URL: "redis://valkey:6379"
      NATS_URL: "nats://nats:4222"
      OPENSEARCH_URL: "http://opensearch:9200"
      POOL_SIZE: ${POOL_SIZE:-10}
      UPLOADS_DIR: /app/uploads
      # Email (optional)
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-noreply@${DOMAIN}}
      # Media domain — separate origin for user uploads (security)
      MEDIA_HOST: ${MEDIA_HOST:-}
      # S3 (optional)
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      # Instance actor keys (for federation signing)
      INSTANCE_PUBLIC_KEY: ${INSTANCE_PUBLIC_KEY:-}
      INSTANCE_PRIVATE_KEY: ${INSTANCE_PRIVATE_KEY:-}
    volumes:
      - uploads:/app/uploads
    networks:
      - internal
    expose:
      - "4000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hs_frontend
    restart: unless-stopped
    environment:
      PORT: "3000"
      ORIGIN: "https://${DOMAIN:?}"
      VITE_API_URL: "http://backend:4000"
    depends_on:
      - backend
    networks:
      - internal
    expose:
      - "3000"

  # ---- Reverse Proxy ----

  caddy:
    image: caddy:2-alpine
    container_name: hs_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      DOMAIN: ${DOMAIN:?Set DOMAIN in .env}
      MEDIA_DOMAIN: ${MEDIA_DOMAIN:-}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - frontend
    networks:
      - internal

volumes:
  pgdata:
  valkeydata:
  natsdata:
  searchdata:
  uploads:
  caddy_data:
  caddy_config:

networks:
  internal:
    driver: bridge
